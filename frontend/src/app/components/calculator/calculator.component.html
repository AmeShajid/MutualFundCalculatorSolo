<div class="page-wrapper">

  <div class="calculator-card">

    <div class="card-header">
      <h2>Investment Calculator</h2>
    </div>

    <div class="card-body">

      <div class="error-box" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <div class="form-row">

        <app-fund-select
          [funds]="funds"
          [(selectedTickers)]="selectedTickers"
          [maxSelections]="maxSelections"
        ></app-fund-select>

        <div class="form-group">
          <label for="principalInput">Initial Investment Amount</label>
          <input
            id="principalInput"
            type="number"
            [(ngModel)]="principal"
            placeholder="$"
            min="0"
          />
        </div>

        <div class="form-group">
          <label for="yearsInput">Time Horizon (in years)</label>
          <input
            id="yearsInput"
            type="number"
            [(ngModel)]="years"
            placeholder="Years"
            min="0"
          />
        </div>

        <div class="form-group button-group">
          <label></label>
          <button
            class="calculate-btn"
            (click)="onCalculate()"
            [disabled]="isLoading"
          >
            {{ isLoading ? 'Calculating...' : 'Calculate' }}
          </button>
        </div>

      </div>

      <app-results-table
        [comparisonResult]="comparisonResult"
        [highlightValue]="getHighestFutureValue()"
      ></app-results-table>

    </div>

  </div>

  <app-optimizer
    [selectedTickers]="selectedTickers"
    [principal]="principal"
    [years]="years"
  ></app-optimizer>

</div>
