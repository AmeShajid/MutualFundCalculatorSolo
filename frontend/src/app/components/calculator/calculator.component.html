<div class="page-wrapper">

  <div class="page-header">
    <h1>Mutual Fund Investment Calculator</h1>
    <p>Capital Asset Pricing Model (CAPM) projection with real-time beta and market return data</p>
  </div>

  <div class="divider"></div>

  <div class="main-layout">

    <!-- Left Panel: Investment Parameters -->
    <div class="params-panel">
      <h2 class="panel-title">INVESTMENT PARAMETERS</h2>

      <div class="form-stack">

        <div class="field">
          <label class="field-label">FUND</label>
          <app-fund-select
            [funds]="funds"
            [(selectedTickers)]="selectedTickers"
            [maxSelections]="maxSelections"
          ></app-fund-select>
        </div>

        <div class="field">
          <label class="field-label" for="principalInput">INITIAL INVESTMENT (USD)</label>
          <div class="input-with-prefix">
            <span class="prefix">$</span>
            <input
              id="principalInput"
              type="number"
              [(ngModel)]="principal"
              placeholder="10,000"
              min="0"
            />
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="yearsInput">TIME HORIZON (YEARS)</label>
          <input
            id="yearsInput"
            type="number"
            [(ngModel)]="years"
            placeholder="5"
            min="0"
          />
        </div>

        <button
          class="calculate-btn"
          (click)="onCalculate()"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Calculating...' : 'Calculate' }}
        </button>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

      </div>
    </div>

    <!-- Right Panel: Results -->
    <div class="results-panel">
      <div class="results-placeholder" *ngIf="!comparisonResult && !isLoading">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="20" width="8" height="20" rx="1" stroke="#c0c8d4" stroke-width="2" fill="none"/>
          <rect x="16" y="12" width="8" height="28" rx="1" stroke="#c0c8d4" stroke-width="2" fill="none"/>
          <rect x="28" y="6" width="8" height="34" rx="1" stroke="#c0c8d4" stroke-width="2" fill="none"/>
          <line x1="4" y1="44" x2="40" y2="44" stroke="#c0c8d4" stroke-width="2"/>
        </svg>
        <p>Configure parameters and calculate<br/>to view projection results</p>
      </div>

      <div class="loading-box" *ngIf="isLoading">
        Fetching real-time data and calculating projections...
      </div>

      <app-results-table
        [comparisonResult]="comparisonResult"
        [highlightValue]="getHighestFutureValue()"
      ></app-results-table>
    </div>

  </div>

  <!-- Optimizer Section Below -->
  <app-optimizer
    [selectedTickers]="selectedTickers"
    [principal]="principal"
    [years]="years"
  ></app-optimizer>

</div>
