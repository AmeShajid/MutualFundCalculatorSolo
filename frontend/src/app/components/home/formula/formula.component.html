<section class="formula-section">
  <h3>How We Calculate Future Value</h3>
  <div class="formula">FV = P &times; e<sup>rt</sup></div>
  <div class="formula-legend">
    <span><strong>FV</strong> = Future Value</span>
    <span><strong>P</strong> = Principal (initial investment)</span>
    <span><strong>r</strong> = Expected annual return (from CAPM)</span>
    <span><strong>t</strong> = Time in years</span>
  </div>
</section>
