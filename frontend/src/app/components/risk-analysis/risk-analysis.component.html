<!-- Risk Analysis page container -->
<div class="page-wrap">

  <!-- Page header -->
  <div class="page-header">
    <h1>Monte Carlo Risk Analysis</h1>
    <p>Simulate hundreds of possible futures based on a fund's volatility. See the full range of outcomes — not just the average.</p>
  </div>

  <!-- Two-column grid: controls left, results right -->
  <div class="main-grid">

    <!-- Left column: controls -->
    <app-simulation-controls
      [funds]="funds"
      [isRunning]="isRunning"
      (runSimulation)="onRunSimulation($event)"
    ></app-simulation-controls>

    <!-- Right column: results -->
    <div class="results-area">

      <!-- Error message -->
      <div class="error-box" *ngIf="errorMessage">{{ errorMessage }}</div>

      <!-- Chart card (always visible — shows empty/loading/chart) -->
      <app-simulation-chart [results]="results" [isRunning]="isRunning"></app-simulation-chart>

      <!-- Stats cards (hidden until simulation runs) -->
      <app-simulation-stats *ngIf="results" [results]="results"></app-simulation-stats>

      <!-- Details card (hidden until simulation runs) -->
      <app-simulation-details *ngIf="results" [results]="results"></app-simulation-details>

    </div>

  </div>

</div>
