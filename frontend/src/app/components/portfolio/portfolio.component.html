<div class="portfolio-page">

  <!-- Config bar (was sidebar, now full-width at top) -->
  <app-portfolio-sidebar
    [funds]="funds"
    [selectedFunds]="selectedFunds"
    [riskTolerance]="riskTolerance"
    [principal]="principal"
    [years]="years"
    [isGenerating]="isGenerating"
    (fundAdded)="onFundAdded($event)"
    (fundRemoved)="onFundRemoved($event)"
    (riskToleranceChange)="onRiskToleranceChange($event)"
    (principalChange)="onPrincipalChange($event)"
    (yearsChange)="onYearsChange($event)"
    (generate)="onGenerate()"
  ></app-portfolio-sidebar>

  <!-- Hero summary -->
  <app-portfolio-summary
    [recommendation]="recommendation"
    [principal]="principal"
    [years]="years"
  ></app-portfolio-summary>

  <!-- Error message -->
  <div class="error-banner" *ngIf="errorMessage">
    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span>{{ errorMessage }}</span>
    <button class="error-dismiss" (click)="errorMessage = ''">&times;</button>
  </div>

  <!-- Empty state -->
  <div class="empty-dashboard" *ngIf="!recommendation && !isGenerating">
    <div class="empty-illustration">
      <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="10" y="40" width="20" height="60" rx="4" fill="#e0e5ec"/>
        <rect x="38" y="25" width="20" height="75" rx="4" fill="#c8d0da"/>
        <rect x="66" y="50" width="20" height="50" rx="4" fill="#e0e5ec"/>
        <rect x="94" y="15" width="20" height="85" rx="4" fill="#c8d0da"/>
        <line x1="5" y1="105" x2="119" y2="105" stroke="#d0d5dc" stroke-width="2"/>
        <path d="M10 70 Q38 20 66 55 Q94 10 118 30" stroke="var(--color-navy)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.3"/>
      </svg>
    </div>
    <h2 class="empty-title">Build Your Portfolio</h2>
    <p class="empty-subtitle">Select mutual funds, set your preferences, and let AI optimize your allocation</p>
    <div class="empty-steps">
      <div class="step">
        <span class="step-num">1</span>
        <span class="step-text">Search and add 2–5 funds</span>
      </div>
      <div class="step">
        <span class="step-num">2</span>
        <span class="step-text">Set risk tolerance &amp; investment amount</span>
      </div>
      <div class="step">
        <span class="step-num">3</span>
        <span class="step-text">Click Generate to get AI recommendations</span>
      </div>
    </div>
  </div>

  <!-- Loading state -->
  <div class="generating-state" *ngIf="isGenerating">
    <div class="generating-spinner"></div>
    <span class="generating-text">Analyzing your portfolio with AI...</span>
  </div>

  <!-- Dashboard content -->
  <div class="dashboard-content" *ngIf="recommendation">
    <div class="chart-section">
      <app-portfolio-chart
        [recommendation]="recommendation"
        [fundColors]="fundColors"
        [principal]="principal"
        [years]="years"
      ></app-portfolio-chart>
    </div>

    <div class="holdings-section">
      <app-portfolio-holdings
        [recommendation]="recommendation"
        [fundColors]="fundColors"
      ></app-portfolio-holdings>
    </div>

    <div class="reasoning-section">
      <app-portfolio-reasoning
        [recommendation]="recommendation"
        [messages]="messages"
        [isSending]="isSending"
      ></app-portfolio-reasoning>
    </div>
  </div>

  <!-- Floating AI Chat Bar -->
  <div class="chat-bar" *ngIf="recommendation">
    <div class="chat-bar-inner">
      <div class="suggested-questions" *ngIf="messages.length === 0">
        <button
          class="question-chip"
          *ngFor="let q of suggestedQuestions"
          (click)="onSendFollowUp(q)"
          [disabled]="isSending"
        >{{ q }}</button>
      </div>
      <div class="chat-input-row">
        <div class="chat-input-wrapper">
          <svg class="chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <input
            type="text"
            [(ngModel)]="chatInput"
            placeholder="Ask about your portfolio..."
            (keydown.enter)="onSendFromBar()"
            [disabled]="isSending"
          />
        </div>
        <button
          class="chat-send-btn"
          (click)="onSendFromBar()"
          [disabled]="!chatInput.trim() || isSending"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>
