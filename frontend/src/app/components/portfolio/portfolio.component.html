<div class="portfolio-page" [class.sidebar-collapsed]="!sidebarOpen">

  <app-portfolio-sidebar
    [funds]="funds"
    [selectedFunds]="selectedFunds"
    [riskTolerance]="riskTolerance"
    [principal]="principal"
    [years]="years"
    [isGenerating]="isGenerating"
    (fundAdded)="onFundAdded($event)"
    (fundRemoved)="onFundRemoved($event)"
    (riskToleranceChange)="onRiskToleranceChange($event)"
    (principalChange)="onPrincipalChange($event)"
    (yearsChange)="onYearsChange($event)"
    (generate)="onGenerate()"
  ></app-portfolio-sidebar>

  <div class="main-content">
    <app-portfolio-summary
      [recommendation]="recommendation"
      [principal]="principal"
      [years]="years"
    ></app-portfolio-summary>

    <div class="content-grid">
      <div class="chart-area">
        <app-portfolio-chart
          [recommendation]="recommendation"
          [fundColors]="fundColors"
          [principal]="principal"
          [years]="years"
        ></app-portfolio-chart>

        <app-portfolio-reasoning
          [recommendation]="recommendation"
          [messages]="messages"
          [isSending]="isSending"
          (sendFollowUp)="onSendFollowUp($event)"
        ></app-portfolio-reasoning>
      </div>

      <app-portfolio-holdings
        [recommendation]="recommendation"
        [fundColors]="fundColors"
      ></app-portfolio-holdings>
    </div>
  </div>

  <button
    *ngIf="!sidebarOpen"
    class="edit-portfolio-btn"
    (click)="toggleSidebar()"
  >
    Edit Portfolio
  </button>
</div>
