<div class="config-bar">

  <!-- Fund search + chips -->
  <div class="funds-section">
    <div class="fund-chips">
      <div class="fund-chip" *ngFor="let fund of selectedFunds">
        <span class="chip-dot" [style.background-color]="fund.color"></span>
        <span class="chip-ticker">{{ fund.symbol }}</span>
        <button class="chip-remove" (click)="onRemoveFund(fund.symbol)">&times;</button>
      </div>

      <!-- Inline search -->
      <div class="search-container" *ngIf="selectedFunds.length < 5">
        <input
          type="text"
          class="search-input"
          [(ngModel)]="searchQuery"
          [placeholder]="selectedFunds.length === 0 ? 'Search funds...' : '+ Add fund'"
          (focus)="onSearchFocus()"
        />
        <div class="dropdown" *ngIf="showDropdown && availableFunds.length > 0">
          <div
            class="dropdown-row"
            *ngFor="let fund of availableFunds"
            (click)="onAddFund(fund)"
          >
            <span class="dropdown-ticker">{{ fund.symbol }}</span>
            <span class="dropdown-name">{{ fund.name }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div class="bar-divider"></div>

  <!-- Risk toggle -->
  <div class="risk-toggles">
    <button
      class="risk-btn"
      [class.active]="riskTolerance === 'conservative'"
      (click)="onRiskChange('conservative')"
    >Conservative</button>
    <button
      class="risk-btn"
      [class.active]="riskTolerance === 'moderate'"
      (click)="onRiskChange('moderate')"
    >Moderate</button>
    <button
      class="risk-btn"
      [class.active]="riskTolerance === 'aggressive'"
      (click)="onRiskChange('aggressive')"
    >Aggressive</button>
  </div>

  <!-- Divider -->
  <div class="bar-divider"></div>

  <!-- Inline inputs -->
  <div class="inline-inputs">
    <div class="inline-input-group">
      <label for="principalInput">Amount</label>
      <input
        id="principalInput"
        type="number"
        [ngModel]="principal"
        (ngModelChange)="onPrincipalChange($event)"
        placeholder="$10,000"
        min="0"
      />
    </div>
    <div class="inline-input-group">
      <label for="yearsInput">Years</label>
      <input
        id="yearsInput"
        type="number"
        [ngModel]="years"
        (ngModelChange)="onYearsChange($event)"
        placeholder="10"
        min="1"
      />
    </div>
  </div>

  <!-- Generate button -->
  <button
    class="generate-btn"
    (click)="onGenerate()"
    [disabled]="selectedFunds.length < 2 || isGenerating"
  >
    <span class="spinner" *ngIf="isGenerating"></span>
    {{ isGenerating ? 'Generating...' : 'Generate' }}
  </button>

</div>
