<div class="chart-card">
  <!-- Card header -->
  <div class="card-header">
    <span class="card-title">Portfolio Growth</span>
    <div class="chart-legend" *ngIf="recommendation">
      <div class="legend-item" *ngFor="let li of legendItems">
        <span class="legend-dot" [style.background-color]="li.color"></span>
        <span class="legend-label">{{ li.ticker }}</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot" style="background-color: #1a6fba;"></span>
        <span class="legend-label">Total</span>
      </div>
      <div class="legend-item">
        <span class="legend-line" style="border-color: #e85d3a;"></span>
        <span class="legend-label">Initial</span>
      </div>
    </div>
  </div>

  <!-- Chart body -->
  <div class="chart-body">
    <svg #chartSvg
         viewBox="0 0 800 410"
         class="chart-svg"
         xmlns="http://www.w3.org/2000/svg"
         (mousemove)="onChartMouseMove($event)"
         (mouseleave)="onChartMouseLeave()">
      <defs>
        <linearGradient [attr.id]="gradientId" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a6fba" stop-opacity="0.25"/>
          <stop offset="100%" stop-color="#1a6fba" stop-opacity="0.02"/>
        </linearGradient>
      </defs>

      <ng-container *ngIf="recommendation">
        <!-- Grid lines -->
        <g *ngFor="let gl of gridLines">
          <line [attr.x1]="xMin" [attr.y1]="gl.y" [attr.x2]="xMax" [attr.y2]="gl.y"
                stroke="#e8e8e8" stroke-dasharray="4,4"/>
          <text [attr.x]="xMin - 8" [attr.y]="gl.y + 4" text-anchor="end"
                fill="#999" font-size="11" font-family="'DM Mono', monospace">
            {{ gl.label }}
          </text>
        </g>

        <!-- X axis ticks -->
        <g *ngFor="let xt of xTicks">
          <text [attr.x]="xt.x" [attr.y]="yMax + 20" text-anchor="middle"
                fill="#999" font-size="11" font-family="'DM Mono', monospace">
            {{ xt.label }}
          </text>
        </g>
        <text [attr.x]="(xMin + xMax) / 2" [attr.y]="yMax + 38" text-anchor="middle"
              fill="#aaa" font-size="12">Years</text>

        <!-- Break-even line -->
        <line [attr.x1]="xMin" [attr.y1]="breakEvenY" [attr.x2]="xMax" [attr.y2]="breakEvenY"
              stroke="#e85d3a" stroke-dasharray="6,4" stroke-opacity="0.6"/>
        <text [attr.x]="xMin + 4" [attr.y]="breakEvenY - 6"
              fill="#e85d3a" font-size="10" font-family="'DM Mono', monospace">
          {{ breakEvenLabel }}
        </text>

        <!-- Area under total line -->
        <polygon [attr.points]="totalAreaPoints" [attr.fill]="'url(#' + gradientId + ')'"/>

        <!-- Fund lines -->
        <polyline *ngFor="let fl of fundLines"
                  [attr.points]="fl.points"
                  fill="none"
                  [attr.stroke]="fl.color"
                  stroke-width="2"
                  stroke-opacity="0.5"/>

        <!-- Total line -->
        <polyline [attr.points]="totalLine"
                  fill="none" stroke="#1a6fba" stroke-width="3"/>

        <!-- Endpoint -->
        <circle [attr.cx]="endpointX" [attr.cy]="endpointY" r="5" fill="#1a6fba"/>
        <text [attr.x]="endpointX - 8" [attr.y]="endpointY - 14" text-anchor="end"
              fill="#1a6fba" font-size="14" font-weight="700"
              font-family="'DM Mono', monospace">
          {{ endpointLabel }}
        </text>

        <!-- Hover line -->
        <line *ngIf="hoveredYear !== null"
              [attr.x1]="hoverLineX" [attr.y1]="yMin"
              [attr.x2]="hoverLineX" [attr.y2]="yMax"
              stroke="var(--color-navy)" stroke-width="1" stroke-opacity="0.3"/>

        <!-- Hover dots on each line -->
        <ng-container *ngIf="tooltipData">
          <circle *ngFor="let fd of tooltipData.funds"
                  [attr.cx]="hoverLineX"
                  [attr.cy]="yMax - ((fd.value / yMaxValue) * (yMax - yMin))"
                  r="4" [attr.fill]="fd.color" stroke="white" stroke-width="1.5"/>
          <circle
            [attr.cx]="hoverLineX"
            [attr.cy]="yMax - ((tooltipData.total / yMaxValue) * (yMax - yMin))"
            r="5" fill="#1a6fba" stroke="white" stroke-width="2"/>
        </ng-container>
      </ng-container>
    </svg>

    <!-- HTML tooltip overlay -->
    <div class="chart-tooltip"
         *ngIf="tooltipData"
         [style.left.px]="tooltipX * (1)"
         [style.top.px]="tooltipY * (1)"
         [class.flip-left]="hoverLineX > (xMax - 200)">
      <div class="tooltip-header">Year {{ tooltipData.year }}</div>
      <div class="tooltip-row" *ngFor="let fd of tooltipData.funds">
        <span class="tooltip-dot" [style.background-color]="fd.color"></span>
        <span class="tooltip-ticker">{{ fd.ticker }}</span>
        <span class="tooltip-value">{{ formatDollar(fd.value) }}</span>
      </div>
      <div class="tooltip-divider"></div>
      <div class="tooltip-row tooltip-total">
        <span class="tooltip-dot" style="background-color: #1a6fba;"></span>
        <span class="tooltip-ticker">Total</span>
        <span class="tooltip-value">{{ formatDollar(tooltipData.total) }}</span>
      </div>
    </div>
  </div>
</div>
